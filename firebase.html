<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle Remoto Arduino</title>
    
    <link rel="stylesheet" href="firebase.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
              apiKey: "AIzaSyDHH7SFX-Ao6a1nE8li_IYyp6BjpFrDx10",
              authDomain: "endereco3aelias.firebaseapp.com",
              projectId: "endereco3aelias",
              storageBucket: "endereco3aelias.firebasestorage.app",
              messagingSenderId: "965511939666",
              appId: "1:965511939666:web:d1a48466e9ff7ca4a0818b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Nova função que atualiza campos específicos sem apagar o resto do documento
        async function enviarDados(valor, tipoCampo) {
            const mensagem = document.getElementById("mensagem");
            
            try {
                const docRef = doc(db, "movimentos", "atual");
                
                // Criamos o objeto de atualização dinamicamente
                const dadosAtualizados = {
                    horario: serverTimestamp()
                };
                dadosAtualizados[tipoCampo] = valor; // Define se vai atualizar 'comando' ou 'direcional'

                // updateDoc modifica apenas os campos enviados, preservando os outros
                await updateDoc(docRef, dadosAtualizados);

                mensagem.textContent = `${tipoCampo.toUpperCase()}: ${valor}`;
                mensagem.style.color = "#00ff22";
            } catch (error) {
                mensagem.textContent = "Erro: " + error.message;
                mensagem.style.color = "#ff003c";
            }
        }
        window.enviarDados = enviarDados;
    </script>
</head>
<body>
    <div class="gamepad-container">
        <div class="left-side">
            <div class="dpad-buttons">
                <button class="dpad-btn dpad-up" onclick="enviarDados('W', 'direcional')">▲</button>
                <button class="dpad-btn dpad-left" onclick="enviarDados('A', 'direcional')">◀</button>
                <button class="dpad-btn dpad-right" onclick="enviarDados('D', 'direcional')">▶</button>
                <button class="dpad-btn dpad-down" onclick="enviarDados('S', 'direcional')">▼</button>
            </div>
        </div>

        <div class="center-side">
            <p id="mensagem">Aguardando comando...</p>
        </div>

        <div class="right-side">
            <div class="xbox-buttons">
                <button class="xbox-btn xbox-btn-y" onclick="enviarDados('Y', 'comando')">Y</button>
                <button class="xbox-btn xbox-btn-x" onclick="enviarDados('X', 'comando')">X</button>
                <button class="xbox-btn xbox-btn-o" onclick="enviarDados('O', 'comando')">O</button>
                <button class="xbox-btn xbox-btn-a" onclick="enviarDados('A', 'comando')">A</button>
            </div>
        </div>
    </div>
</body>
</html>
