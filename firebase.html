<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Xbox Arduino</title>
    
    <link rel="stylesheet" href="firebase.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
              apiKey: "AIzaSyDHH7SFX-Ao6a1nE8li_IYyp6BjpFrDx10",
              authDomain: "endereco3aelias.firebaseapp.com",
              projectId: "endereco3aelias",
              storageBucket: "endereco3aelias.firebasestorage.app",
              messagingSenderId: "965511939666",
              appId: "1:965511939666:web:d1a48466e9ff7ca4a0818b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function movimentar(direcao) {
            const mensagem = document.getElementById("mensagem");
            
            try {
                const docRef = doc(db, "movimentos", "atual");
                await setDoc(docRef, {
                    comando: direcao,
                    horario: serverTimestamp()
                });
                mensagem.textContent = `Comando: ${direcao}`;
                mensagem.style.color = "#00ff22";
            } catch (error) {
                mensagem.textContent = "Erro: " + error.message;
                mensagem.style.color = "#ff003c";
            }
        }
        window.movimentar = movimentar;
    </script>
</head>
<body>
    <div class="control-panel">
        <fieldset>
            <legend>CONTROLE DE MOVIMENTO</legend>
            <div class="xbox-buttons">
                <button class="xbox-btn-y" onclick="movimentar('Y')">Y</button>
                <button class="xbox-btn-x" onclick="movimentar('X')">X</button>
                <button class="xbox-btn-o" onclick="movimentar('O')">O</button>
                <button class="xbox-btn-a" onclick="movimentar('A')">A</button>
            </div>
        </fieldset>
        <p id="mensagem"></p>
    </div>
</body>
</html>
