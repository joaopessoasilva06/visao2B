<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Arduino</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        // Importamos 'getFirestore', 'doc' e 'setDoc' para atualizar um documento específico
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Suas configurações do Firebase
        const firebaseConfig = {
              apiKey: "AIzaSyDHH7SFX-Ao6a1nE8li_IYyp6BjpFrDx10",
              authDomain: "endereco3aelias.firebaseapp.com",
              projectId: "endereco3aelias",
              storageBucket: "endereco3aelias.firebasestorage.app",
              messagingSenderId: "965511939666",
              appId: "1:965511939666:web:d1a48466e9ff7ca4a0818b"
        };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Função para atualizar o comando
        async function movimentar(direcao) {
            const mensagem = document.getElementById("mensagem");
            
            try {
                // doc(db, "coleção", "ID_do_documento")
                // Criamos/Apontamos para um documento chamado "atual" dentro da coleção "movimentos"
                const docRef = doc(db, "movimentos", "atual");

                // setDoc substitui os dados desse documento específico na mesma hora
                await setDoc(docRef, {
                    comando: direcao,
                    horario: serverTimestamp() // Opcional, bom para o Arduino saber quando mudou
                });

                mensagem.textContent = `Movimento alterado para: ${direcao}`;
                mensagem.style.color = "green";
            } catch (error) {
                mensagem.textContent = "Erro ao atualizar: " + error.message;
                mensagem.style.color = "red";
            }
        }

        // Torna a função visível para o HTML "onclick"
        window.movimentar = movimentar;
    </script>
</head>
<body>
    <fieldset>
        <legend>CONTROLE DE MOVIMENTO</legend>
        <button onclick="movimentar('Y')">PARA FRENTE (Y)</button>
        <button onclick="movimentar('X')">PARA ESQUERDA (X)</button>
        <button onclick="movimentar('O')">PARA DIREITA (O)</button>
        <button onclick="movimentar('A')">PARA TRAS (A)</button>
    </fieldset>

    <p id="mensagem"></p>
</body>
</html>
